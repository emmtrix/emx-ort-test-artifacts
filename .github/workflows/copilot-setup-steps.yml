name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build ccache lld

      - name: Restore ccache objects
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ github.run_id }}
          restore-keys: |
            ccache

      - name: Configure ccache for Copilot sessions
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/.ccache"
          {
            echo "CMAKE_C_COMPILER_LAUNCHER=ccache"
            echo "CMAKE_CXX_COMPILER_LAUNCHER=ccache"
            echo "CCACHE_DIR=${GITHUB_WORKSPACE}/.ccache"
            echo "CCACHE_MAXSIZE=2G"
          } >> "${GITHUB_ENV}"
          CCACHE_DIR="${GITHUB_WORKSPACE}/.ccache" ccache -M 2G
          CCACHE_DIR="${GITHUB_WORKSPACE}/.ccache" ccache -s

      - name: Install maintainer dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
